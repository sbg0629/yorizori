spring.application.name=YoRiZoRi


#Spring MVC
server.port=8484
spring.mvc.view.prefix=/WEB-INF/views/
spring.mvc.view.suffix=.jsp

#Server
server.servlet.session.timeout=30m

#mybatis config
mybatis.config-location=classpath:mybatis-config.xml

#Database config
#spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.driver-class-name=oracle.jdbc.driver.OracleDriver
#spring.datasource.url=jdbc:mysql://localhost:3306/atom
spring.datasource.url=jdbc:oracle:thin:@localhost:1521:xe
spring.datasource.username=son
spring.datasource.password=1234

# ===============================
# Google SMTP Mail Settings
# ===============================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=[placeholder]
spring.mail.password=[placeholder]

#Mongo DB
spring.data.mongodb.host=localhost
spring.data.mongodb.port=27017
spring.data.mongodb.database=matom

#한글깨짐 오류해결
server.servlet.encoding.force=true

#Gemini API Key
gemini.api.key=[placeholder]

# 추가 옵션
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000